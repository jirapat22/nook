<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Background -->
  <rect width="200" height="200" rx="44" fill="#f7f4ee"/>
  <!-- Nook corner: two lines forming a cosy right-angle corner -->
  <path d="M 60 140 L 60 70 L 130 70" stroke="#c8843a" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Warm light dot in the corner -->
  <circle cx="60" cy="70" r="10" fill="#c8843a"/>
  <!-- Outer glow -->
  <circle cx="60" cy="70" r="18" fill="#c8843a" opacity="0.18"/>
  <!-- Small cosy dot accent -->
  <circle cx="95" cy="105" r="5" fill="#c8843a" opacity="0.35"/>
</svg>
